<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Etsy Match Review</title>
  <style>
    :root {
      --bg: #0f172a;
      --bg-alt: #020617;
      --card-bg: #020617;
      --border: #1e293b;
      --accent: #38bdf8;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --danger: #f97373;
      --success: #4ade80;
      --warn: #fbbf24;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b 0, #020617 42%, #000 100%);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
    }
    h1 { margin: 0; font-size: 26px; }
    .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn, button {
      border: 1px solid var(--border);
      background: #0b1222;
      color: var(--text);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover, button:hover { border-color: var(--accent); }
    .btn.primary, button.primary { border-color: var(--accent); }
    .btn.good, button.good { border-color: var(--success); color: var(--success); }
    .btn.bad, button.bad { border-color: var(--danger); color: var(--danger); }

    .card {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      background: linear-gradient(145deg, rgba(15,23,42,0.98), rgba(15,23,42,0.92));
      box-shadow: 0 18px 45px rgba(15,23,42,0.9);
      margin-bottom: 14px;
    }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .pill {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 11px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .item {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: rgba(2,6,23,0.7);
      display: grid;
      gap: 10px;
    }

    .title { font-size: 14px; font-weight: 700; line-height: 1.3; margin: 0; }
    .small { font-size: 12px; color: var(--muted); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }

    .kvs { display: grid; grid-template-columns: 1fr; gap: 6px; }
    .kvs > div { border: 1px solid var(--border); border-radius: 10px; padding: 8px; }

    .actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .linkrow { display: flex; gap: 6px; flex-wrap: wrap; }

    select {
      background: #020617;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 13px;
    }

    @media (max-width: 1100px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <h1>Etsy Match Review</h1>
      <div class="sub">Apply exact title matches and manually approve/deny fuzzy matches.</div>
    </div>
    <div class="nav">
      <a class="btn" href="/">Home</a>
      <a class="btn" href="/reporting">Reporting</a>
      <a class="btn" href="/admin">Admin</a>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <button class="primary" onclick="applyExact()">Apply Exact + Normalized Exact</button>
      <label class="small">Bucket</label>
      <select id="bucket" onchange="loadItems()">
        <option value="all">all</option>
        <option value="high">high</option>
        <option value="medium" selected>medium</option>
        <option value="low">low</option>
        <option value="unmatched">unmatched</option>
      </select>
      <label class="small">Status</label>
      <select id="status" onchange="loadItems()">
        <option value="pending" selected>pending</option>
        <option value="approved">approved</option>
        <option value="denied">denied</option>
        <option value="all">all</option>
      </select>
      <span id="meta" class="pill">Idle</span>
    </div>
    <div id="summary" class="small" style="margin-top: 8px;"></div>
  </div>

  <div id="list" class="grid"></div>

  <script>
    function esc(s) {
      return String(s ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }

    function setMeta(text, color) {
      const el = document.getElementById('meta');
      el.textContent = text;
      el.style.borderColor = color || 'var(--border)';
      el.style.color = color || 'var(--muted)';
    }

    async function loadSummary() {
      const r = await fetch('/reporting/etsy-match/summary');
      const d = await r.json();
      if (!r.ok) {
        document.getElementById('summary').textContent = 'No summary found. Run JSON export first.';
        return;
      }
      const s = d.summary || {};
      document.getElementById('summary').textContent =
        `Etsy ${s.etsy_total ?? 0} | Exact ${s.exact ?? 0} | Normalized Exact ${s.normalized_exact ?? 0} | High ${s.high ?? 0} | Medium ${s.medium ?? 0} | Low ${s.low ?? 0} | Unmatched ${s.unmatched ?? 0}`;
    }

    async function applyExact() {
      setMeta('Applying exact matches...');
      const r = await fetch('/reporting/etsy-match/apply-exact', { method: 'POST' });
      const d = await r.json();
      if (!r.ok) {
        setMeta(`Error ${r.status}`, 'var(--danger)');
        return;
      }
      setMeta(`Applied ${d.applied}/${d.matched_candidates}`, 'var(--success)');
      await loadItems();
    }

    function rowCard(item) {
      const idx = window.__rows.length;
      window.__rows.push(item);
      const etsyLink = item.etsy_link ? `<a class="btn" href="${item.etsy_link}" target="_blank" rel="noopener noreferrer">Open Etsy</a>` : '';
      const shopifyDev = item.shopify_links?.dev ? `<a class="btn" href="${item.shopify_links.dev}" target="_blank" rel="noopener noreferrer">Open Shopify Dev</a>` : '';
      const shopifyProd = item.shopify_links?.prod ? `<a class="btn" href="${item.shopify_links.prod}" target="_blank" rel="noopener noreferrer">Open Shopify Prod</a>` : '';

      return `
        <div class="item" id="row-${esc(item.etsy_listing_id)}-${esc(item.normalized_sku)}">
          <div class="row">
            <span class="pill mono">listing ${esc(item.etsy_listing_id)}</span>
            <span class="pill">${esc(item.bucket || 'n/a')}</span>
            <span class="pill">score: ${esc(item.score ?? 'n/a')}</span>
            <span class="pill">status: ${esc(item.review_status || 'pending')}</span>
          </div>

          <div class="kvs">
            <div>
              <div class="small">Etsy title</div>
              <p class="title">${esc(item.etsy_title)}</p>
            </div>
            <div>
              <div class="small">Potential normalized match (${esc(item.normalized_sku || 'none')})</div>
              <p class="title">${esc(item.normalized_title || 'No candidate')}</p>
            </div>
          </div>

          <div class="linkrow">
            ${etsyLink}
            ${shopifyDev}
            ${shopifyProd}
          </div>

          <div class="actions">
            <button class="good" onclick="approveMatch(${idx})" ${item.normalized_sku ? '' : 'disabled'}>Approve</button>
            <button class="bad" onclick="denyMatch(${idx})">Deny</button>
          </div>
        </div>
      `;
    }

    async function loadItems() {
      const bucket = document.getElementById('bucket').value;
      const status = document.getElementById('status').value;
      setMeta('Loading...');
      const r = await fetch(`/reporting/etsy-match/review?bucket=${encodeURIComponent(bucket)}&status=${encodeURIComponent(status)}&limit=300`);
      const d = await r.json();
      if (!r.ok) {
        setMeta(`Error ${r.status}`, 'var(--danger)');
        return;
      }
      window.__rows = [];
      document.getElementById('list').innerHTML = (d.items || []).map(rowCard).join('');
      setMeta(`${d.count} items`, 'var(--success)');
    }

    async function approveMatch(idx) {
      const item = window.__rows[idx];
      if (!item) return;
      const body = {
        etsy_listing_id: item.etsy_listing_id,
        normalized_sku: item.normalized_sku,
        score: item.score,
        bucket: item.bucket,
      };
      const r = await fetch('/reporting/etsy-match/review/approve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) {
        setMeta(`Approve failed (${r.status})`, 'var(--danger)');
        return;
      }
      setMeta('Approved', 'var(--success)');
      await loadItems();
    }

    async function denyMatch(idx) {
      const item = window.__rows[idx];
      if (!item) return;
      const reason = prompt('Optional deny reason:', '') || null;
      const body = {
        etsy_listing_id: item.etsy_listing_id,
        normalized_sku: item.normalized_sku,
        reason,
      };
      const r = await fetch('/reporting/etsy-match/review/deny', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) {
        setMeta(`Deny failed (${r.status})`, 'var(--danger)');
        return;
      }
      setMeta('Denied', 'var(--warn)');
      await loadItems();
    }

    async function logout() {
      await fetch('/auth/passkey/logout', { method: 'POST' }).catch(() => null);
      window.location.href = '/login?next=/etsy-review';
    }

    (async () => {
      window.__rows = [];
      await loadSummary();
      await loadItems();
    })();
  </script>
</body>
</html>
