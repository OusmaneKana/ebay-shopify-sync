<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Etsy Match Review</title>
  <style>
    :root {
      --bg: #f3ede3;
      --paper: #fffaf3;
      --ink: #1f1f1f;
      --muted: #6d665f;
      --line: #dccdb7;
      --accent: #2f6d5f;
      --accent-2: #c24b39;
      --ok: #2a7a4a;
      --warn: #b56f1e;
      --danger: #9f2a1f;
      --shadow: 0 10px 30px rgba(49, 35, 21, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% -10%, rgba(246, 211, 165, 0.6) 0, rgba(246, 211, 165, 0) 32%),
        radial-gradient(circle at 90% 0%, rgba(181, 205, 179, 0.55) 0, rgba(181, 205, 179, 0) 35%),
        var(--bg);
      min-height: 100vh;
    }

    .container {
      max-width: 1320px;
      margin: 0 auto;
      padding: 20px 16px 50px;
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(6px);
      background: rgba(243, 237, 227, 0.85);
      border-bottom: 1px solid var(--line);
      margin: 0 -16px 16px;
      padding: 14px 16px;
    }

    .top-inner {
      max-width: 1320px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .title-wrap h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn, button {
      border: 1px solid var(--line);
      background: var(--paper);
      border-radius: 999px;
      padding: 8px 13px;
      font-size: 13px;
      color: var(--ink);
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.14s ease, border-color 0.14s ease;
    }

    .btn:hover, button:hover {
      transform: translateY(-1px);
      border-color: #b9a68b;
    }

    .btn-approve { border-color: #8dbf9e; color: var(--ok); }
    .btn-deny { border-color: #d9a19a; color: var(--danger); }

    .search {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 8px 12px;
      min-width: 250px;
      font-size: 13px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 12px 0 18px;
    }

    .stat {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 10px 12px;
    }

    .stat-label {
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 11px;
      color: var(--muted);
    }

    .stat-value {
      margin-top: 2px;
      font-size: 26px;
      font-weight: 700;
      font-family: Georgia, "Times New Roman", serif;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
      min-height: 18px;
    }

    .list {
      display: grid;
      gap: 14px;
      max-height: calc(100vh - 220px);
      overflow-y: auto;
      padding-right: 4px;
    }

    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 14px;
      opacity: 0;
      transform: translateY(8px);
      animation: reveal 0.35s ease forwards;
    }

    @keyframes reveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .row-head {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 10px;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 11px;
      color: var(--muted);
      background: #fff;
    }

    .compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .pane {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #fff;
    }

    .pane h3 {
      margin: 0 0 8px;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .img-wrap {
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--line);
      aspect-ratio: 1 / 1;
      background: linear-gradient(160deg, #f7f1e8, #f0e5d5);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }

    .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .img-fallback {
      color: var(--muted);
      font-size: 12px;
      padding: 12px;
      text-align: center;
    }

    .title {
      margin: 0;
      font-size: 14px;
      line-height: 1.35;
      font-weight: 600;
    }

    .sku-row {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .sku-row input {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 11px;
      min-width: 260px;
      font-size: 13px;
      background: #fff;
    }

    .actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    @media (max-width: 980px) {
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .compare { grid-template-columns: 1fr; }
      .search { min-width: 180px; width: 100%; }
      .list { max-height: calc(100vh - 260px); }
    }
  </style>
</head>
<body>
  <div class="top">
    <div class="top-inner">
      <div class="title-wrap">
        <h1>Etsy Match Review</h1>
        <div class="sub">Excel-driven review queue. Approve writes SKU to Etsy and removes that row from workbook.</div>
      </div>
      <div class="controls">
        <input id="search" class="search" placeholder="Search listing id, sku, title" oninput="applyFilters()" />
        <button id="flushBtn" onclick="flushQueuedApprovals()">Flush Approvals</button>
        <a class="btn" href="/">Home</a>
        <button onclick="refreshData()">Refresh</button>
        <button onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="stats" id="stats"></div>
    <div class="meta" id="meta">Loading...</div>
    <div class="list" id="list"></div>
  </div>

  <script>
    const APPROVAL_BATCH_SIZE = 15;
    const APPROVAL_QUEUE_KEY = "etsy_review_approval_queue_v1";

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function setMeta(text, color) {
      const el = document.getElementById("meta");
      el.textContent = text;
      el.style.color = color || "var(--muted)";
    }

    function formatConfidence(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "n/a";
      return `${n.toFixed(2)}%`;
    }

    function renderStats(rows, workbook) {
      const withImages = rows.filter((r) => r.etsy_image || r.shopify_image).length;
      const highConf = rows.filter((r) => Number(r.confidence_rate) >= 80).length;
      const queued = (window.__approvalQueue || []).length;
      document.getElementById("stats").innerHTML = `
        <div class="stat"><div class="stat-label">Rows Remaining</div><div class="stat-value">${rows.length}</div></div>
        <div class="stat"><div class="stat-label">High Confidence</div><div class="stat-value">${highConf}</div></div>
        <div class="stat"><div class="stat-label">Rows With Images</div><div class="stat-value">${withImages}</div></div>
        <div class="stat"><div class="stat-label">Workbook</div><div class="stat-value" style="font-size:13px;line-height:1.35;">${esc(workbook || "n/a")}</div></div>
        <div class="stat"><div class="stat-label">Queued Approvals</div><div class="stat-value">${queued}</div></div>
      `;

      const flushBtn = document.getElementById("flushBtn");
      if (flushBtn) {
        flushBtn.textContent = queued > 0 ? `Flush Approvals (${queued})` : "Flush Approvals";
        flushBtn.disabled = queued === 0 || !!window.__isFlushing;
      }
    }

    function imagePane(url, alt) {
      if (!url) {
        return `<div class="img-wrap"><div class="img-fallback">No image available</div></div>`;
      }
      return `<div class="img-wrap"><img src="${esc(url)}" alt="${esc(alt)}" loading="lazy" /></div>`;
    }

    function cardId(item) {
      return `row-${item.listing_id}`;
    }

    function rowCard(item, index) {
      const etsyLink = item.etsy_link
        ? `<a class="btn" target="_blank" rel="noopener noreferrer" href="${esc(item.etsy_link)}">Open Etsy</a>`
        : "";
      const shopifyLink = item.matched_shopify_link || item.shopify_links?.prod;
      const shopifyBtn = shopifyLink
        ? `<a class="btn" target="_blank" rel="noopener noreferrer" href="${esc(shopifyLink)}">Open Shopify</a>`
        : "";

      return `
        <div class="card" id="${cardId(item)}" style="animation-delay:${Math.min(index * 0.02, 0.3)}s">
          <div class="row-head">
            <span class="pill">Listing ${esc(item.listing_id)}</span>
            <span class="pill">SKU ${esc(item.matched_mongo_sku || "n/a")}</span>
            <span class="pill">Confidence ${esc(formatConfidence(item.confidence_rate))}</span>
          </div>

          <div class="compare">
            <div class="pane">
              <h3>Etsy Listing</h3>
              ${imagePane(item.etsy_image, item.etsy_title || "Etsy listing image")}
              <p class="title">${esc(item.etsy_title || "Untitled listing")}</p>
              <div class="actions">${etsyLink}</div>
            </div>

            <div class="pane">
              <h3>Potential Shopify Match</h3>
              ${imagePane(item.shopify_image, item.matched_mongo_title || "Shopify product image")}
              <p class="title">${esc(item.matched_mongo_title || "No Mongo title")}</p>
              <div class="actions">${shopifyBtn}</div>
            </div>
          </div>

          <div class="sku-row">
            <span>SKU to write to Etsy:</span>
            <input id="sku-${index}" value="${esc(item.matched_mongo_sku || "")}" />
          </div>

          <div class="actions">
            <button class="btn-approve" onclick="approve(${index})">Approve</button>
            <button class="btn-deny" onclick="deny(${index})">Deny</button>
          </div>
        </div>
      `;
    }

    function applyFilters() {
      const q = document.getElementById("search").value.trim().toLowerCase();
      const rows = (window.__rowsAll || []).filter((item) => {
        if (!q) return true;
        const hay = [
          item.listing_id,
          item.matched_mongo_sku,
          item.etsy_title,
          item.matched_mongo_title,
        ].map((v) => String(v || "").toLowerCase()).join(" ");
        return hay.includes(q);
      });

      window.__rows = rows;
      document.getElementById("list").innerHTML = rows.map(rowCard).join("");
      renderStats(rows, window.__workbook);
      setMeta(`${rows.length} visible rows`);
    }

    async function refreshData() {
      setMeta("Loading review queue...");
      const r = await fetch("/reporting/etsy-match-excel/review?limit=1200");
      const data = await r.json();
      if (!r.ok) {
        setMeta(data.detail || `Failed (${r.status})`, "var(--danger)");
        return;
      }
      window.__rowsAll = data.items || [];
      window.__workbook = data.workbook;
      applyFilters();
    }

    function removeFromState(listingId) {
      window.__rowsAll = (window.__rowsAll || []).filter((r) => String(r.listing_id) !== String(listingId));
      applyFilters();
    }

    function loadApprovalQueue() {
      try {
        const raw = localStorage.getItem(APPROVAL_QUEUE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        window.__approvalQueue = Array.isArray(parsed) ? parsed : [];
      } catch (_) {
        window.__approvalQueue = [];
      }
    }

    function persistApprovalQueue() {
      localStorage.setItem(APPROVAL_QUEUE_KEY, JSON.stringify(window.__approvalQueue || []));
      renderStats(window.__rows || [], window.__workbook);
    }

    function upsertApprovalQueue(item) {
      const queue = window.__approvalQueue || [];
      const key = String(item.listing_id);
      const next = queue.filter((x) => String(x.listing_id) !== key);
      next.push(item);
      window.__approvalQueue = next;
      persistApprovalQueue();
    }

    function removeApprovedFromQueue(successes) {
      const done = new Set((successes || []).map((x) => String(x.listing_id)));
      window.__approvalQueue = (window.__approvalQueue || []).filter((x) => !done.has(String(x.listing_id)));
      persistApprovalQueue();
    }

    async function approve(index) {
      const item = window.__rows[index];
      if (!item) return;
      const skuInput = document.getElementById(`sku-${index}`);
      const sku = (skuInput?.value || "").trim();
      if (!sku) {
        setMeta("SKU is required for approve", "var(--warn)");
        skuInput?.focus();
        return;
      }

      const queuedItem = {
        listing_id: item.listing_id,
        matched_mongo_sku: sku,
        confidence_rate: item.confidence_rate,
      };
      upsertApprovalQueue(queuedItem);

      const card = document.getElementById(cardId(item));
      card.style.opacity = "0.3";
      setTimeout(() => {
        card.remove();
        removeFromState(item.listing_id);
      }, 260);

      const queued = (window.__approvalQueue || []).length;
      setMeta(`Queued ${item.listing_id}. Pending approvals: ${queued}.`, "var(--ok)");

      if (queued >= APPROVAL_BATCH_SIZE) {
        await flushQueuedApprovals();
      }
    }

    async function flushQueuedApprovals() {
      if (window.__isFlushing) return;
      const queue = window.__approvalQueue || [];
      if (!queue.length) {
        setMeta("No queued approvals to flush.");
        return;
      }

      window.__isFlushing = true;
      renderStats(window.__rows || [], window.__workbook);
      setMeta(`Flushing ${queue.length} queued approvals...`);

      const r = await fetch("/reporting/etsy-match-excel/review/approve-batch", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ approvals: queue }),
      });
      let d = null;
      try { d = await r.json(); } catch (_) {}

      if (!r.ok) {
        const msg = d?.detail || `Batch approve failed (${r.status})`;
        setMeta(msg, "var(--danger)");
        window.__isFlushing = false;
        renderStats(window.__rows || [], window.__workbook);
        return;
      }

      removeApprovedFromQueue(d.successes || []);
      const failed = Number(d.failed || 0);
      if (failed > 0) {
        setMeta(`Applied ${d.applied}, failed ${failed}. Failed items stayed queued for retry.`, "var(--warn)");
      } else {
        setMeta(`Applied ${d.applied} queued approvals.`, "var(--ok)");
      }

      window.__isFlushing = false;
      renderStats(window.__rows || [], window.__workbook);
    }

    async function deny(index) {
      const item = window.__rows[index];
      if (!item) return;
      const reason = prompt("Optional deny reason:", "") || null;

      const card = document.getElementById(cardId(item));
      card?.querySelectorAll("button").forEach((b) => (b.disabled = true));

      const r = await fetch("/reporting/etsy-match-excel/review/deny", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          listing_id: item.listing_id,
          matched_mongo_sku: item.matched_mongo_sku,
          reason,
        }),
      });
      let d = null;
      try { d = await r.json(); } catch (_) {}

      if (!r.ok) {
        const msg = d?.detail || `Deny failed (${r.status})`;
        setMeta(msg, "var(--danger)");
        card?.querySelectorAll("button").forEach((b) => (b.disabled = false));
        return;
      }

      setMeta(`Denied listing ${item.listing_id}`, "var(--warn)");
      card.style.opacity = "0.55";
      card.style.borderColor = "#d9a19a";
    }

    async function logout() {
      await fetch('/auth/passkey/logout', { method: 'POST' }).catch(() => null);
      window.location.href = '/login?next=/etsy-review';
    }

    window.__rowsAll = [];
    window.__rows = [];
    window.__workbook = null;
    window.__approvalQueue = [];
    window.__isFlushing = false;
    loadApprovalQueue();
    refreshData();
  </script>
</body>
</html>
