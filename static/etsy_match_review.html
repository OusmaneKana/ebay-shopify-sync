<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Etsy Match Review</title>
  <style>
    :root {
      --bg: #0f172a;
      --bg-alt: #020617;
      --card-bg: #020617;
      --border: #1e293b;
      --accent: #38bdf8;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --danger: #f97373;
      --success: #4ade80;
      --warn: #fbbf24;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b 0, #020617 42%, #000 100%);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
    }
    h1 { margin: 0; font-size: 26px; }
    .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn, button {
      border: 1px solid var(--border);
      background: #0b1222;
      color: var(--text);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover, button:hover { border-color: var(--accent); }
    .btn.primary, button.primary { border-color: var(--accent); }
    .btn.good, button.good { border-color: var(--success); color: var(--success); }
    .btn.bad, button.bad { border-color: var(--danger); color: var(--danger); }

    .card {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      background: linear-gradient(145deg, rgba(15,23,42,0.98), rgba(15,23,42,0.92));
      box-shadow: 0 18px 45px rgba(15,23,42,0.9);
      margin-bottom: 14px;
    }
    .dashboard {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .stat {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      background: rgba(2, 6, 23, 0.75);
    }
    .stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .stat .value { font-size: 22px; font-weight: 700; margin-top: 4px; }
    .stat .subvalue { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .pill {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 11px;
      color: var(--muted);
    }
    .field-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.03em; }
    .field-value { font-size: 14px; font-weight: 600; }
    .filters { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .search {
      background: #020617;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      min-width: 220px;
    }
    .checkwrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(2, 6, 23, 0.65);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .item {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: rgba(2,6,23,0.7);
      display: grid;
      gap: 10px;
    }

    .title { font-size: 14px; font-weight: 700; line-height: 1.3; margin: 0; }
    .small { font-size: 12px; color: var(--muted); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }

    .kvs { display: grid; grid-template-columns: 1fr; gap: 6px; }
    .kvs > div { border: 1px solid var(--border); border-radius: 10px; padding: 8px; }

    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .manual-link {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      background: rgba(2, 6, 23, 0.55);
    }
    .manual-link input {
      background: #020617;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 7px 12px;
      min-width: 220px;
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .linkrow { display: flex; gap: 6px; flex-wrap: wrap; }

    select {
      background: #020617;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 13px;
    }

    @media (max-width: 1100px) {
      .grid { grid-template-columns: 1fr; }
      .dashboard { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .filters { width: 100%; margin-left: 0; }
      .search { min-width: 0; width: 100%; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <h1>Etsy Match Review</h1>
      <div class="sub">Apply exact title matches and manually approve/deny fuzzy matches.</div>
    </div>
    <div class="nav">
      <a class="btn" href="/">Home</a>
      <a class="btn" href="/reporting">Reporting</a>
      <a class="btn" href="/admin">Admin</a>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <button class="primary" onclick="applyExact()">Apply Exact + Normalized Exact</button>
      <label class="small">Bucket</label>
      <select id="bucket" onchange="loadItems()">
        <option value="all">all</option>
        <option value="high">high</option>
        <option value="medium" selected>medium</option>
        <option value="low">low</option>
        <option value="unmatched">unmatched</option>
      </select>
      <label class="small">Status</label>
      <select id="status" onchange="loadItems()">
        <option value="pending" selected>pending</option>
        <option value="approved">approved</option>
        <option value="denied">denied</option>
        <option value="all">all</option>
      </select>
      <span id="meta" class="pill">Idle</span>
      <div class="filters">
        <input id="search" class="search" placeholder="Search listing, SKU, or title" oninput="applyClientFilters()" />
        <label class="checkwrap">
          <input id="shipOnly" type="checkbox" onchange="applyClientFilters()" />
          shipping > 0 only
        </label>
      </div>
    </div>
    <div id="summary" class="small" style="margin-top: 8px;"></div>
    <div id="dashboard" class="dashboard"></div>
  </div>

  <div id="list" class="grid"></div>

  <script>
    function esc(s) {
      return String(s ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }

    function setMeta(text, color) {
      const el = document.getElementById('meta');
      el.textContent = text;
      el.style.borderColor = color || 'var(--border)';
      el.style.color = color || 'var(--muted)';
    }

    function toNum(v) {
      if (v == null) return null;
      if (typeof v === 'object' && v.amount != null) {
        const amount = Number(v.amount);
        const divisor = Number(v.divisor || 1);
        if (Number.isFinite(amount) && Number.isFinite(divisor) && divisor !== 0) return amount / divisor;
      }
      const n = Number(String(v).replace('$', '').trim());
      return Number.isFinite(n) ? n : null;
    }

    function fmtMoney(v) {
      const n = toNum(v);
      if (n == null) return 'n/a';
      return `$${n.toFixed(2)}`;
    }

    function firstShippingCost(shipping) {
      if (!Array.isArray(shipping)) return null;
      for (const opt of shipping) {
        const n = toNum(opt?.cost);
        if (n != null) return n;
      }
      return null;
    }

    function renderDashboard(rows) {
      const total = rows.length;
      let approved = 0;
      let pending = 0;
      let denied = 0;
      let withShip = 0;
      let withPrices = 0;
      for (const item of rows) {
        const s = (item.review_status || 'pending');
        if (s === 'approved') approved += 1;
        else if (s === 'denied') denied += 1;
        else pending += 1;

        const ship = firstShippingCost(item.normalized_shipping);
        if (ship != null && ship > 0) withShip += 1;

        if (toNum(item.normalized_price) != null || toNum(item.etsy_price) != null) withPrices += 1;
      }

      document.getElementById('dashboard').innerHTML = `
        <div class="stat"><div class="label">Visible Matches</div><div class="value">${total}</div><div class="subvalue">Current filters</div></div>
        <div class="stat"><div class="label">Pending</div><div class="value">${pending}</div><div class="subvalue">Needs review</div></div>
        <div class="stat"><div class="label">Approved</div><div class="value">${approved}</div><div class="subvalue">Linked to Mongo</div></div>
        <div class="stat"><div class="label">Denied</div><div class="value">${denied}</div><div class="subvalue">Rejected links</div></div>
        <div class="stat"><div class="label">Shipping > 0</div><div class="value">${withShip}</div><div class="subvalue">Rows with non-free shipping</div></div>
      `;
    }

    async function loadSummary() {
      const r = await fetch('/reporting/etsy-match/summary');
      const d = await r.json();
      if (!r.ok) {
        document.getElementById('summary').textContent = 'No summary found. Run JSON export first.';
        return;
      }
      const s = d.summary || {};
      document.getElementById('summary').textContent =
        `Etsy ${s.etsy_total ?? 0} | Exact ${s.exact ?? 0} | Normalized Exact ${s.normalized_exact ?? 0} | High ${s.high ?? 0} | Medium ${s.medium ?? 0} | Low ${s.low ?? 0} | Unmatched ${s.unmatched ?? 0}`;
    }

    async function applyExact() {
      setMeta('Applying exact matches...');
      const r = await fetch('/reporting/etsy-match/apply-exact', { method: 'POST' });
      const d = await r.json();
      if (!r.ok) {
        setMeta(`Error ${r.status}`, 'var(--danger)');
        return;
      }
      setMeta(`Applied ${d.applied}/${d.matched_candidates}`, 'var(--success)');
      await loadItems();
    }

    function cardId(item) {
      return `row-${item.etsy_listing_id}`;
    }

    function removeCard(item) {
      const el = document.getElementById(cardId(item));
      if (el) el.remove();
      // remove from __rowsAll so filters stay consistent
      window.__rowsAll = (window.__rowsAll || []).filter(
        (r) => r.etsy_listing_id !== item.etsy_listing_id
      );
      // recalculate dashboard from rendered rows
      renderDashboard(window.__rowsAll);
      const remaining = document.querySelectorAll('#list .item').length;
      setMeta(`${remaining} items`, 'var(--success)');
    }

    function markCardStatus(item, newStatus) {
      const el = document.getElementById(cardId(item));
      if (!el) return;
      // update status pill in-place
      const pill = el.querySelector('.pill-status');
      if (pill) pill.textContent = `status: ${newStatus}`;
      // flash border colour
      const color = newStatus === 'approved' ? 'var(--success)' : 'var(--danger)';
      el.style.transition = 'border-color 0.2s';
      el.style.borderColor = color;
      el.style.opacity = '0.5';
      setTimeout(() => el.remove(), 600);
    }

    function rowCard(item) {
      const idx = window.__rows.length;
      window.__rows.push(item);
      const etsyLink = item.etsy_link ? `<a class="btn" href="${item.etsy_link}" target="_blank" rel="noopener noreferrer">Open Etsy</a>` : '';
      const shopifyDev = item.shopify_links?.dev ? `<a class="btn" href="${item.shopify_links.dev}" target="_blank" rel="noopener noreferrer">Open Shopify Dev</a>` : '';
      const shopifyProd = item.shopify_links?.prod ? `<a class="btn" href="${item.shopify_links.prod}" target="_blank" rel="noopener noreferrer">Open Shopify Prod</a>` : '';
      const ship = firstShippingCost(item.normalized_shipping);

      return `
        <div class="item" id="${cardId(item)}">
          <div class="row">
            <span class="pill mono">listing ${esc(item.etsy_listing_id)}</span>
            <span class="pill mono">sku ${esc(item.normalized_sku || 'n/a')}</span>
            <span class="pill">${esc(item.bucket || 'n/a')}</span>
            <span class="pill">score: ${esc(item.score ?? 'n/a')}</span>
            <span class="pill pill-status">status: ${esc(item.review_status || 'pending')}</span>
          </div>

          <div class="kvs">
            <div>
              <div class="small">Etsy title</div>
              <p class="title">${esc(item.etsy_title)}</p>
            </div>
            <div>
              <div class="small">Potential normalized match (${esc(item.normalized_sku || 'none')})</div>
              <p class="title">${esc(item.normalized_title || 'No candidate')}</p>
            </div>
            <div>
              <div class="field-label">Pricing</div>
              <div class="field-value">eBay/Etsy: ${fmtMoney(item.etsy_price)} | Normalized: ${fmtMoney(item.normalized_price)}</div>
              <div class="small">Shipping (Mongo): ${ship == null ? 'n/a' : `$${ship.toFixed(2)}`}</div>
            </div>
          </div>

          <div class="linkrow">
            ${etsyLink}
            ${shopifyDev}
            ${shopifyProd}
          </div>

          <div class="manual-link">
            <span class="small">Mongo SKU to link</span>
            <input id="manual-sku-${idx}" value="${esc(item.normalized_sku || '')}" placeholder="Type normalized SKU (example: EB-156497205403)" />
          </div>

          <div class="actions">
            <button class="good" onclick="approveMatch(${idx})">Approve / Link</button>
            <button class="bad" onclick="denyMatch(${idx})">Deny</button>
          </div>
        </div>
      `;
    }

    function applyClientFilters() {
      const q = document.getElementById('search').value.trim().toLowerCase();
      const shipOnly = document.getElementById('shipOnly').checked;
      const rows = (window.__rowsAll || []).filter((item) => {
        if (shipOnly) {
          const ship = firstShippingCost(item.normalized_shipping);
          if (!(ship != null && ship > 0)) return false;
        }

        if (!q) return true;
        const haystack = [
          item.etsy_listing_id,
          item.normalized_sku,
          item.etsy_title,
          item.normalized_title,
        ].map((v) => String(v || '').toLowerCase()).join(' ');
        return haystack.includes(q);
      });

      window.__rows = [];
      document.getElementById('list').innerHTML = rows.map(rowCard).join('');
      renderDashboard(rows);
      setMeta(`${rows.length} items`, 'var(--success)');
    }

    async function loadItems() {
      const bucket = document.getElementById('bucket').value;
      const status = document.getElementById('status').value;
      setMeta('Loading...');
      const r = await fetch(`/reporting/etsy-match/review?bucket=${encodeURIComponent(bucket)}&status=${encodeURIComponent(status)}&limit=300`);
      const d = await r.json();
      if (!r.ok) {
        setMeta(`Error ${r.status}`, 'var(--danger)');
        return;
      }
      window.__rowsAll = d.items || [];
      window.__rows = [];
      applyClientFilters();
    }

    async function approveMatch(idx) {
      const item = window.__rows[idx];
      if (!item) return;
      const manualSkuInput = document.getElementById(`manual-sku-${idx}`);
      const selectedSku = (manualSkuInput?.value || item.normalized_sku || '').trim();
      if (!selectedSku) {
        setMeta('Enter a Mongo SKU before approving', 'var(--warn)');
        manualSkuInput?.focus();
        return;
      }
      // disable buttons immediately to prevent double-submit
      const card = document.getElementById(cardId(item));
      card?.querySelectorAll('button').forEach((b) => (b.disabled = true));
      const body = {
        etsy_listing_id: item.etsy_listing_id,
        normalized_sku: selectedSku,
        score: item.score,
        bucket: item.bucket,
      };
      const r = await fetch('/reporting/etsy-match/review/approve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      let respJson = null;
      try { respJson = await r.json(); } catch (_) {}
      if (!r.ok) {
        const detail = respJson?.detail || `HTTP ${r.status}`;
        setMeta(`Approve failed: ${detail}`, 'var(--danger)');
        alert(`Approve failed: ${detail}`);
        card?.querySelectorAll('button').forEach((b) => (b.disabled = false));
        return;
      }
      setMeta(`Approved ${selectedSku}`, 'var(--success)');
      markCardStatus(item, 'approved');
      setTimeout(() => removeCard(item), 620);
    }

    async function denyMatch(idx) {
      const item = window.__rows[idx];
      if (!item) return;
      const reason = prompt('Optional deny reason:', '') || null;
      const card = document.getElementById(cardId(item));
      card?.querySelectorAll('button').forEach((b) => (b.disabled = true));
      const body = {
        etsy_listing_id: item.etsy_listing_id,
        normalized_sku: item.normalized_sku,
        reason,
      };
      const r = await fetch('/reporting/etsy-match/review/deny', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) {
        setMeta(`Deny failed (${r.status})`, 'var(--danger)');
        card?.querySelectorAll('button').forEach((b) => (b.disabled = false));
        return;
      }
      setMeta('Denied', 'var(--warn)');
      markCardStatus(item, 'denied');
      setTimeout(() => removeCard(item), 620);
    }

    async function logout() {
      await fetch('/auth/passkey/logout', { method: 'POST' }).catch(() => null);
      window.location.href = '/login?next=/etsy-review';
    }

    (async () => {
      window.__rows = [];
      window.__rowsAll = [];
      await loadSummary();
      await loadItems();
    })();
  </script>
</body>
</html>
