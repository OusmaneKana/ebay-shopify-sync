<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    :root {
      --bg: #0f172a;
      --bg-alt: #020617;
      --border: #1e293b;
      --accent: #38bdf8;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --danger: #f97373;
      --success: #4ade80;
    }

    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 28px;
      background: radial-gradient(circle at top, #1e293b 0, #020617 40%, #000 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      min-height: 100vh;
    }

    .card {
      width: min(520px, 100%);
      background: linear-gradient(145deg, rgba(15,23,42,0.98), rgba(15,23,42,0.92));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 18px 16px;
      box-shadow: 0 18px 45px rgba(15,23,42,0.9);
    }

    h1 { margin: 0 0 4px; font-size: 22px; }
    p { margin: 0 0 14px; color: var(--muted); font-size: 13px; }

    label { display: block; color: var(--muted); font-size: 12px; margin: 10px 0 6px; }

    input {
      width: 100%;
      background: #020617;
      color: var(--text);
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 10px 12px;
      font-size: 13px;
    }

    button {
      margin-top: 14px;
      width: 100%;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: radial-gradient(circle at top left, rgba(56,189,248,0.16), rgba(15,23,42,0.96));
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
    }

    button:hover { border-color: var(--accent); }

    .msg {
      margin-top: 12px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(2, 6, 23, 0.6);
      min-height: 18px;
    }

    .msg.error { border-color: var(--danger); color: var(--danger); }
    .msg.ok { border-color: var(--success); color: var(--success); }

    a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Passkey Login</h1>
    <p>Enter the passkey to access Admin/Reporting.</p>

    <label for="passkey">Passkey</label>
    <input id="passkey" type="password" placeholder="••••••••" autocomplete="current-password" />

    <button onclick="doLogin()">Login</button>

    <div id="msg" class="msg">Idle.</div>

    <p style="margin-top: 12px; font-size: 12px; color: var(--muted);">
      <a href="/">Back to home</a>
    </p>
  </div>

  <script>
    function nextTarget() {
      const url = new URL(window.location.href);
      return url.searchParams.get('next') || '/';
    }

    async function doLogin() {
      const passkey = document.getElementById('passkey').value;
      const msg = document.getElementById('msg');
      msg.className = 'msg';
      msg.textContent = 'Logging in…';

      try {
        const resp = await fetch('/auth/passkey/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ passkey })
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok || !data.ok) {
          msg.className = 'msg error';
          msg.textContent = (data && (data.error || data.detail)) ? String(data.error || data.detail) : `Login failed (${resp.status})`;
          return;
        }
        msg.className = 'msg ok';
        msg.textContent = 'OK. Redirecting…';
        window.location.href = nextTarget();
      } catch (e) {
        msg.className = 'msg error';
        msg.textContent = 'Request failed: ' + e.message;
      }
    }

    // Enter submits
    document.getElementById('passkey').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
